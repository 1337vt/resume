name: CISA KEV News Generator

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      test_cve:
        description: 'Test with a specific CVE ID (e.g., CVE-2026-48027)'
        required: false
        type: string
      backfill_year:
        description: 'Generate articles for all CVEs from a year (e.g., 2026)'
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Run generator
        run: python .github/scripts/generate_cisa_news.py
        env:
          TEST_CVE: ${{ inputs.test_cve }}
          BACKFILL_YEAR: ${{ inputs.backfill_year }}

      - name: Commit and push if changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news/ .github/ index.html sitemap.xml
          if ! git diff --quiet --staged; then
            git commit -m "auto: CISA KEV news [$(date +%Y-%m-%d)]"
            git push
          fi
